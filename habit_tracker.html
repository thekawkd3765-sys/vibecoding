<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>습관 트래커</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface-soft: #fafafa;
      --line: #e6e7eb;
      --ink: #242631;
      --muted: #737787;
      --violet: #7c3aed;
      --violet-dark: #6d28d9;
      --violet-soft: #ede9fe;
      --ring: rgba(124, 58, 237, 0.22);
      --shadow: 0 18px 50px rgba(40, 42, 54, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(180deg, #ffffff 0%, var(--bg) 44%),
        var(--bg);
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    main {
      width: min(100%, 860px);
      margin: 0 auto;
      padding: clamp(22px, 5vw, 44px);
    }

    header {
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 3.1rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 600;
    }

    .app {
      display: grid;
      gap: 18px;
    }

    .add-form,
    .habit-list {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .add-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px;
    }

    .field-label {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    input[type="text"] {
      width: 100%;
      min-height: 48px;
      padding: 0 15px;
      color: var(--ink);
      background: var(--surface-soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--violet);
      box-shadow: 0 0 0 5px var(--ring);
      background: #ffffff;
    }

    button {
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .add-button {
      min-height: 48px;
      padding: 0 18px;
      color: #ffffff;
      background: var(--violet);
      box-shadow: 0 10px 22px rgba(124, 58, 237, 0.22);
      transition: background 150ms ease, transform 150ms ease;
    }

    .add-button:hover {
      background: var(--violet-dark);
      transform: translateY(-1px);
    }

    .add-button:active {
      transform: translateY(0);
    }

    .habit-list {
      overflow: hidden;
    }

    .list-head,
    .habit-row {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) minmax(360px, 1.2fr) 44px;
      gap: 16px;
      align-items: center;
    }

    .list-head {
      padding: 15px 18px;
      color: var(--muted);
      background: #fbfbfc;
      border-bottom: 1px solid var(--line);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .days {
      display: grid;
      grid-template-columns: repeat(7, minmax(38px, 1fr));
      gap: 8px;
      align-items: center;
    }

    .day-label {
      text-align: center;
    }

    .habit-row {
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .habit-row:last-child {
      border-bottom: 0;
    }

    .habit-name {
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: 1.05rem;
      font-weight: 850;
    }

    .habit-track {
      min-width: 0;
      display: grid;
      gap: 11px;
    }

    .check-wrap {
      display: grid;
      place-items: center;
      min-width: 38px;
      min-height: 38px;
    }

    .check-wrap input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .check-dot {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      color: transparent;
      background: #ffffff;
      border: 2px solid #d7d9e0;
      border-radius: 50%;
      font-size: 1.05rem;
      font-weight: 900;
      line-height: 1;
      transition: border 150ms ease, background 150ms ease, color 150ms ease, transform 150ms ease;
    }

    .check-wrap:hover .check-dot {
      border-color: var(--violet);
      transform: scale(1.04);
    }

    .check-wrap input:focus-visible + .check-dot {
      box-shadow: 0 0 0 5px var(--ring);
      border-color: var(--violet);
    }

    .check-wrap input:checked + .check-dot {
      color: #ffffff;
      background: var(--violet);
      border-color: var(--violet);
    }

    .progress {
      display: grid;
      grid-template-columns: max-content minmax(90px, 1fr);
      gap: 12px;
      align-items: center;
    }

    .progress-text {
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .progress-bar {
      height: 10px;
      overflow: hidden;
      background: var(--violet-soft);
      border-radius: 999px;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: var(--violet);
      border-radius: inherit;
      transition: width 360ms ease;
    }

    .delete-button {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: transparent;
      font-size: 1.35rem;
      line-height: 1;
      transition: color 150ms ease, background 150ms ease;
    }

    .delete-button:hover {
      color: var(--violet-dark);
      background: var(--violet-soft);
    }

    .empty {
      padding: 42px 18px;
      color: var(--muted);
      text-align: center;
      font-weight: 700;
    }

    @media (max-width: 720px) {
      .add-form {
        grid-template-columns: 1fr;
      }

      .list-head {
        display: none;
      }

      .habit-row {
        grid-template-columns: 1fr 40px;
        gap: 14px;
      }

      .habit-name {
        grid-column: 1;
      }

      .habit-track {
        grid-column: 1 / -1;
      }

      .delete-button {
        grid-column: 2;
        grid-row: 1;
        justify-self: end;
      }

      .days {
        grid-column: 1 / -1;
        grid-template-columns: repeat(7, minmax(36px, 1fr));
      }

      .check-dot {
        width: 32px;
        height: 32px;
      }

    }

    @media (max-width: 420px) {
      main {
        padding: 18px;
      }

      .days {
        gap: 5px;
      }

      .check-wrap {
        min-width: 32px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>습관 트래커</h1>
      <p class="subtitle">월요일부터 일요일까지, 이번 주의 작은 약속을 체크하세요.</p>
    </header>

    <section class="app" aria-label="습관 트래커 앱">
      <form class="add-form" id="addForm">
        <label class="field-label" for="habitInput">새 습관 추가</label>
        <input id="habitInput" type="text" placeholder="새 습관 추가" autocomplete="off" maxlength="40" required>
        <button class="add-button" type="submit">추가</button>
      </form>

      <section class="habit-list" aria-label="습관 리스트">
        <div class="list-head" aria-hidden="true">
          <span>습관</span>
          <div class="days">
            <span class="day-label">월</span>
            <span class="day-label">화</span>
            <span class="day-label">수</span>
            <span class="day-label">목</span>
            <span class="day-label">금</span>
            <span class="day-label">토</span>
            <span class="day-label">일</span>
          </div>
          <span></span>
        </div>
        <div id="habitList"></div>
      </section>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "habit-tracker-items";
    const dayNames = ["월", "화", "수", "목", "금", "토", "일"];
    const addForm = document.querySelector("#addForm");
    const habitInput = document.querySelector("#habitInput");
    const habitList = document.querySelector("#habitList");

    let habits = loadHabits();

    function loadHabits() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return Array.isArray(saved) ? saved : [];
      } catch {
        return [];
      }
    }

    function saveHabits() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
      } catch {
        // The app still works for the current page even if browser storage is blocked.
      }
    }

    function createHabit(name) {
      return {
        id: typeof crypto !== "undefined" && crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        name,
        days: Array(7).fill(false)
      };
    }

    function getWeeklyProgress(habit) {
      const completedDays = habit.days.filter(Boolean).length;
      const percent = Math.round((completedDays / 7) * 100);
      return { completedDays, percent };
    }

    function updateProgress(progressText, progressFill, habit) {
      const { percent } = getWeeklyProgress(habit);
      progressText.textContent = `이번 주 달성률 ${percent}%`;
      progressFill.style.width = `${percent}%`;
      progressFill.parentElement.setAttribute("aria-valuenow", String(percent));
    }

    function renderHabits() {
      habitList.innerHTML = "";

      if (habits.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "아직 추가된 습관이 없습니다.";
        habitList.append(empty);
        return;
      }

      habits.forEach((habit, habitIndex) => {
        const row = document.createElement("article");
        row.className = "habit-row";

        const name = document.createElement("div");
        name.className = "habit-name";
        name.textContent = habit.name;

        const habitTrack = document.createElement("div");
        habitTrack.className = "habit-track";

        const days = document.createElement("div");
        days.className = "days";

        const progress = document.createElement("div");
        progress.className = "progress";

        const progressText = document.createElement("span");
        progressText.className = "progress-text";

        const progressBar = document.createElement("div");
        progressBar.className = "progress-bar";
        progressBar.setAttribute("role", "progressbar");
        progressBar.setAttribute("aria-label", `${habit.name} 이번 주 달성률`);
        progressBar.setAttribute("aria-valuemin", "0");
        progressBar.setAttribute("aria-valuemax", "100");

        const progressFill = document.createElement("div");
        progressFill.className = "progress-fill";

        progressBar.append(progressFill);
        progress.append(progressText, progressBar);

        dayNames.forEach((dayName, dayIndex) => {
          const checkLabel = document.createElement("label");
          checkLabel.className = "check-wrap";
          checkLabel.title = `${habit.name} ${dayName}요일`;

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = Boolean(habit.days[dayIndex]);
          checkbox.setAttribute("aria-label", `${habit.name} ${dayName}요일 완료`);
          checkbox.addEventListener("change", () => {
            habits[habitIndex].days[dayIndex] = checkbox.checked;
            saveHabits();
            updateProgress(progressText, progressFill, habit);
          });

          const dot = document.createElement("span");
          dot.className = "check-dot";
          dot.textContent = "✓";

          checkLabel.append(checkbox, dot);
          days.append(checkLabel);
        });

        updateProgress(progressText, progressFill, habit);
        habitTrack.append(days, progress);

        const deleteButton = document.createElement("button");
        deleteButton.className = "delete-button";
        deleteButton.type = "button";
        deleteButton.textContent = "×";
        deleteButton.setAttribute("aria-label", `${habit.name} 삭제`);
        deleteButton.addEventListener("click", () => {
          habits = habits.filter((item) => item.id !== habit.id);
          saveHabits();
          renderHabits();
        });

        row.append(name, habitTrack, deleteButton);
        habitList.append(row);
      });
    }

    addForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const name = habitInput.value.trim();
      if (!name) return;

      habits.unshift(createHabit(name));
      habitInput.value = "";
      saveHabits();
      renderHabits();
      habitInput.focus();
    });

    renderHabits();
  </script>
</body>
</html>
