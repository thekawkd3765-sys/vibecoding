<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D-day 계산기</title>
  <style>
    :root {
      --ink: #283043;
      --muted: #6b7280;
      --panel: rgba(255, 255, 255, 0.78);
      --panel-border: rgba(255, 255, 255, 0.85);
      --accent: #6c8cff;
      --accent-strong: #526fe5;
      --ring: rgba(108, 140, 255, 0.26);
      --shadow: 0 24px 70px rgba(72, 80, 118, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--ink);
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background:
        radial-gradient(circle at 18% 20%, #ffe4ef 0, transparent 30%),
        radial-gradient(circle at 82% 16%, #d8f5ff 0, transparent 28%),
        radial-gradient(circle at 50% 88%, #e5f7d7 0, transparent 32%),
        linear-gradient(135deg, #fff6d9 0%, #f4e9ff 48%, #dff7f2 100%);
    }

    main {
      width: min(100%, 460px);
      padding: clamp(28px, 6vw, 44px);
      text-align: center;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0 0 28px;
      font-size: clamp(2rem, 7vw, 3.35rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.96rem;
      font-weight: 700;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    input,
    button {
      width: 100%;
      min-height: 52px;
      border-radius: 8px;
      font: inherit;
    }

    input {
      padding: 0 15px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(91, 104, 137, 0.22);
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 5px var(--ring);
    }

    button {
      border: 0;
      color: #ffffff;
      background: var(--accent);
      font-weight: 800;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
      box-shadow: 0 12px 28px rgba(82, 111, 229, 0.28);
    }

    button:hover {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 8px 18px rgba(82, 111, 229, 0.22);
    }

    .result {
      min-height: 118px;
      margin-top: 28px;
      display: grid;
      place-items: center;
      color: var(--accent-strong);
      font-size: clamp(4rem, 18vw, 7rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .message {
      min-height: 24px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
    }

    @media (max-width: 420px) {
      body {
        padding: 18px;
      }

      main {
        padding: 28px 20px;
      }

      .result {
        min-height: 96px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>D-day 계산기</h1>

    <form id="ddayForm">
      <label for="targetDate">목표 날짜</label>
      <div class="controls">
        <input id="targetDate" type="date" required>
        <button type="submit">계산하기</button>
      </div>
    </form>

    <output id="result" class="result" aria-live="polite">D-0</output>
    <div id="message" class="message"></div>
  </main>

  <script>
    const form = document.querySelector("#ddayForm");
    const targetDateInput = document.querySelector("#targetDate");
    const result = document.querySelector("#result");
    const message = document.querySelector("#message");
    const oneDay = 1000 * 60 * 60 * 24;

    function toLocalMidnight(dateValue) {
      const [year, month, day] = dateValue.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function todayAtLocalMidnight() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      if (!targetDateInput.value) {
        result.textContent = "D-0";
        message.textContent = "날짜를 선택해 주세요.";
        return;
      }

      const targetDate = toLocalMidnight(targetDateInput.value);
      const today = todayAtLocalMidnight();
      const daysLeft = Math.round((targetDate - today) / oneDay);

      if (daysLeft > 0) {
        result.textContent = `D-${daysLeft}`;
      } else if (daysLeft < 0) {
        result.textContent = `D+${Math.abs(daysLeft)}`;
      } else {
        result.textContent = "D-Day";
      }

      message.textContent = "";
    });
  </script>
</body>
</html>
